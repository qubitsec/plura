<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="color-scheme" content="light" />
  <title>PLURA | QubitSec</title>
  <!-- PDF pagination + Markdown bare-URL auto-link fix (v4) -->
  <link rel="shortcut icon" href="https://blog.plura.io/images/favicon.ico" type="image/x-icon" />

  <style>
    :root{
      --bg:#f6f8fa;
      --paper:#ffffff;
      --ink:#1f2328;
      --muted:#57606a;
      --line:#d0d7de;
      --line-soft:#eaeef2;
      --header:#f1f4f8;
      --brand:#0969da;
      --brand-dark:#0f172a;
      --code:#f6f8fa;
      --radius:10px;
    }

    *{ box-sizing:border-box; }

    html,body{ margin:0; padding:0; }

    body{
      background:var(--bg);
      color:var(--ink);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic",Arial,sans-serif;
      letter-spacing:-0.01em;
    }

    .toolbar{
      position:sticky;
      top:0;
      z-index:1000;
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      padding:12px 18px;
      background:rgba(15,23,42,.96);
      border-bottom:1px solid rgba(255,255,255,.08);
      color:#e5e7eb;
      backdrop-filter:blur(8px);
    }

    .btn{
      appearance:none;
      border:1px solid #334155;
      border-radius:8px;
      background:#111827;
      color:#e5e7eb;
      padding:9px 13px;
      font-size:13px;
      font-weight:700;
      line-height:1;
      cursor:pointer;
      white-space:nowrap;
      transition:background .12s ease,border-color .12s ease,transform .12s ease;
    }

    .btn:hover{ border-color:#60a5fa; transform:translateY(-1px); }
    .btn:disabled{ opacity:.6; cursor:not-allowed; transform:none; }

    .btn-primary{
      border-color:#2563eb;
      background:linear-gradient(135deg,#2563eb,#1d4ed8);
      color:#fff;
    }

    .badge{
      flex:1 1 260px;
      min-width:180px;
      max-width:100%;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      border:1px solid #334155;
      border-radius:8px;
      background:#0b1220;
      color:#cbd5e1;
      padding:8px 10px;
      font-size:12px;
      line-height:1.1;
    }

    #docInput{
      display:none;
      flex:1 1 420px;
      min-width:260px;
      border:1px solid #334155;
      border-radius:8px;
      background:#0b1220;
      color:#e5e7eb;
      padding:9px 11px;
      font-size:13px;
    }

    #btnLoad{ display:none; }

    .viewer{
      width:min(100%, 980px);
      margin:24px auto;
      padding:0 18px 48px;
    }

    .page{
      background:var(--paper);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:0 12px 34px rgba(15,23,42,.08);
      padding:46px 54px;
    }

    .status{
      margin:0;
      color:var(--muted);
    }

    .markdown-body{
      color:var(--ink);
      font-size:15px;
      line-height:1.75;
      word-break:keep-all;
      overflow-wrap:break-word;
    }

    .markdown-body > :first-child{ margin-top:0 !important; }
    .markdown-body > :last-child{ margin-bottom:0 !important; }

    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3,
    .markdown-body h4,
    .markdown-body h5,
    .markdown-body h6{
      color:#24292f;
      font-weight:800;
      line-height:1.35;
      letter-spacing:-0.035em;
      page-break-after:avoid;
      break-after:avoid;
    }

    .markdown-body h1{
      margin:0 0 22px;
      padding-bottom:12px;
      border-bottom:1px solid var(--line-soft);
      font-size:28px;
    }

    .markdown-body h2{
      margin:34px 0 14px;
      padding-bottom:8px;
      border-bottom:1px solid var(--line-soft);
      font-size:23px;
    }

    .markdown-body h3{
      margin:26px 0 10px;
      font-size:19px;
    }

    .markdown-body h4{ margin:20px 0 8px; font-size:16px; }
    .markdown-body h5{ margin:18px 0 8px; font-size:15px; }
    .markdown-body h6{ margin:16px 0 8px; font-size:14px; color:var(--muted); }

    .markdown-body p{ margin:0 0 14px; }

    .markdown-body strong{ font-weight:800; color:#111827; }
    .markdown-body em{ color:#374151; }

    .markdown-body a{
      color:var(--brand);
      text-decoration:none;
      font-weight:600;
    }
    .markdown-body a:hover{ text-decoration:underline; }

    /* 자동 생성된 긴 URL이 화면과 A4 PDF 영역 밖으로 넘치지 않도록 처리 */
    .markdown-body a.auto-link{
      overflow-wrap:anywhere;
      word-break:break-word;
    }

    .markdown-body hr{
      height:1px;
      margin:28px 0;
      border:0;
      background:var(--line-soft);
    }

    .markdown-body ul,
    .markdown-body ol{
      margin:0 0 16px;
      padding-left:1.55em;
    }

    .markdown-body li{ margin:4px 0; }
    .markdown-body li > p{ margin:6px 0; }

    .markdown-body blockquote{
      margin:16px 0;
      padding:10px 14px;
      color:#3b4754;
      background:#f8fafc;
      border-left:4px solid #9ca3af;
      border-radius:0 8px 8px 0;
      page-break-inside:avoid;
      break-inside:avoid;
    }

    .markdown-body table{
      width:100%;
      margin:14px 0 20px;
      border-collapse:collapse;
      border-spacing:0;
      border:1px solid var(--line);
      font-size:13px;
      line-height:1.55;
      table-layout:auto;
      page-break-inside:auto;
    }

    .markdown-body thead{ display:table-header-group; }
    .markdown-body tbody{ display:table-row-group; }

    .markdown-body th,
    .markdown-body td{
      border:1px solid var(--line);
      padding:8px 10px;
      vertical-align:top;
    }

    .markdown-body th{
      background:var(--header);
      color:#24292f;
      font-weight:800;
      text-align:left;
    }

    .markdown-body tbody tr:nth-child(even) td{ background:#fbfcfd; }

    .markdown-body code{
      background:var(--code);
      border:1px solid #e5e7eb;
      border-radius:5px;
      padding:.1em .35em;
      color:#0f172a;
      font-family:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;
      font-size:.92em;
    }

    .markdown-body pre{
      margin:16px 0;
      padding:14px 16px;
      overflow:auto;
      background:#0f172a;
      color:#e5e7eb;
      border-radius:10px;
      border:1px solid #1e293b;
      font-size:13px;
      line-height:1.55;
      page-break-inside:avoid;
      break-inside:avoid;
    }

    .markdown-body pre code{
      display:block;
      padding:0;
      border:0;
      background:transparent;
      color:inherit;
      font-size:inherit;
      white-space:pre;
    }

    .markdown-body img{
      max-width:100%;
      height:auto;
      page-break-inside:avoid;
      break-inside:avoid;
    }

    .mermaid-block{
      margin:16px 0;
      border:1px solid var(--line);
      border-radius:10px;
      overflow:hidden;
      background:#fff;
      page-break-inside:avoid;
      break-inside:avoid;
    }

    .mermaid-figure{ margin:0; padding:14px; background:#fff; }
    .mermaid-diagram{ display:flex; justify-content:center; align-items:center; overflow:auto; }
    .mermaid-diagram img{ display:block; max-width:100%; height:auto; }
    .mermaid-source{ border-top:1px solid var(--line); }
    .mermaid-source summary{ cursor:pointer; padding:8px 12px; color:var(--muted); background:#f6f8fa; font-size:12px; }
    .mermaid-source pre{ margin:0; border-radius:0; }

    .mermaid-loading,
    .mermaid-error{
      width:100%;
      padding:18px 14px;
      text-align:center;
      color:var(--muted);
      font-size:13px;
      line-height:1.55;
    }

    .mermaid-error{
      color:#991b1b;
      background:#fff1f2;
    }

    .mermaid-diagram img{
      display:block;
      width:auto;
      max-width:100%;
      height:auto;
      margin:0 auto;
    }

    .error-box{
      border:1px solid #fecaca;
      background:#fff1f2;
      color:#991b1b;
      border-radius:10px;
      padding:14px 16px;
    }


    /* Direct PDF Download capture layout: no print dialog, image-based PDF */
    .pdf-capture-host{
      position:absolute !important;
      left:0 !important;
      top:0 !important;
      width:0 !important;
      height:0 !important;
      overflow:visible !important;
      opacity:0 !important;
      pointer-events:none !important;
      z-index:-1 !important;
    }

    .pdf-capture-sheet{
      width:794px;
      min-height:1123px;
      margin:0;
      padding:46px 54px 38px;
      background:#ffffff;
      color:#111827;
      box-sizing:border-box;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic",Arial,sans-serif;
      letter-spacing:-0.01em;
    }

    .pdf-capture-sheet *,
    .pdf-capture-sheet *::before,
    .pdf-capture-sheet *::after{
      box-sizing:border-box;
      -webkit-print-color-adjust:exact;
      print-color-adjust:exact;
    }

    .pdf-capture-sheet .markdown-body{
      margin:0;
      color:#111827;
      background:#ffffff;
      font-size:13.6px;
      line-height:1.55;
      word-break:keep-all;
      overflow-wrap:break-word;
    }

    .pdf-capture-sheet .markdown-body h1{
      margin:0 0 22px !important;
      padding-bottom:11px !important;
      border-bottom:1px solid #d8dee4 !important;
      color:#111827 !important;
      font-size:24px !important;
      line-height:1.28 !important;
      font-weight:900 !important;
      letter-spacing:-0.04em !important;
    }

    .pdf-capture-sheet .markdown-body h2{
      margin:28px 0 13px !important;
      padding-bottom:8px !important;
      border-bottom:1px solid #d8dee4 !important;
      color:#111827 !important;
      font-size:20px !important;
      line-height:1.3 !important;
      font-weight:850 !important;
      letter-spacing:-0.035em !important;
    }

    .pdf-capture-sheet .markdown-body h3{
      margin:22px 0 9px !important;
      color:#111827 !important;
      font-size:17px !important;
      line-height:1.32 !important;
      font-weight:850 !important;
    }

    .pdf-capture-sheet .markdown-body h4{
      margin:18px 0 7px !important;
      color:#111827 !important;
      font-size:14.8px !important;
      font-weight:800 !important;
    }

    .pdf-capture-sheet .markdown-body p{
      margin:0 0 10px !important;
    }

    .pdf-capture-sheet .markdown-body ul,
    .pdf-capture-sheet .markdown-body ol{
      margin:0 0 12px !important;
      padding-left:1.45em !important;
    }

    .pdf-capture-sheet .markdown-body li{
      margin:3px 0 !important;
    }

    .pdf-capture-sheet .markdown-body table{
      width:100% !important;
      margin:11px 0 16px !important;
      border-collapse:collapse !important;
      border-spacing:0 !important;
      border:1px solid #cfd6dd !important;
      color:#111827 !important;
      background:#ffffff !important;
      font-size:11.5px !important;
      line-height:1.42 !important;
      table-layout:auto !important;
    }

    .pdf-capture-sheet .markdown-body th,
    .pdf-capture-sheet .markdown-body td{
      border:1px solid #cfd6dd !important;
      padding:6px 8px !important;
      vertical-align:top !important;
      color:#111827 !important;
    }

    .pdf-capture-sheet .markdown-body th{
      background:#eef2f7 !important;
      font-weight:850 !important;
      text-align:left !important;
    }

    .pdf-capture-sheet .markdown-body tbody tr:nth-child(even) td{
      background:#fbfcfd !important;
    }

    .pdf-capture-sheet .markdown-body a{
      color:#0969da !important;
      text-decoration:none !important;
      font-weight:650 !important;
    }

    .pdf-capture-sheet .markdown-body blockquote{
      margin:12px 0 !important;
      padding:8px 12px !important;
      color:#334155 !important;
      background:#f8fafc !important;
      border-left:4px solid #cbd5e1 !important;
      border-radius:0 6px 6px 0 !important;
    }

    .pdf-capture-sheet .markdown-body pre{
      margin:12px 0 !important;
      padding:12px 14px !important;
      background:#0f172a !important;
      color:#e5e7eb !important;
      border:1px solid #1e293b !important;
      border-radius:8px !important;
      font-size:11.5px !important;
      line-height:1.45 !important;
      white-space:pre-wrap !important;
    }

    .pdf-capture-sheet .markdown-body code{
      background:#f6f8fa !important;
      border:1px solid #e5e7eb !important;
      border-radius:4px !important;
      padding:.08em .3em !important;
      color:#111827 !important;
      font-size:.92em !important;
    }

    .pdf-capture-sheet .markdown-body pre code{
      display:block !important;
      padding:0 !important;
      border:0 !important;
      background:transparent !important;
      color:inherit !important;
    }

    .pdf-capture-sheet .markdown-body hr{
      height:1px !important;
      margin:20px 0 !important;
      border:0 !important;
      background:#d8dee4 !important;
    }

    .pdf-capture-sheet .markdown-body img{
      max-width:100% !important;
      height:auto !important;
    }

    .pdf-capture-sheet.pdf-capture-compact{
      padding:36px 48px 32px;
    }

    .pdf-capture-sheet.pdf-capture-compact .markdown-body{
      font-size:12.4px !important;
      line-height:1.42 !important;
    }

    .pdf-capture-sheet.pdf-capture-compact .markdown-body h1{
      font-size:21px !important;
      margin-bottom:16px !important;
      padding-bottom:8px !important;
    }

    .pdf-capture-sheet.pdf-capture-compact .markdown-body h2{
      font-size:17px !important;
      margin:18px 0 9px !important;
      padding-bottom:5px !important;
    }

    .pdf-capture-sheet.pdf-capture-compact .markdown-body h3{
      font-size:14.6px !important;
      margin:14px 0 6px !important;
    }

    .pdf-capture-sheet.pdf-capture-compact .markdown-body p{
      margin-bottom:7px !important;
    }

    .pdf-capture-sheet.pdf-capture-compact .markdown-body ul,
    .pdf-capture-sheet.pdf-capture-compact .markdown-body ol{
      margin-bottom:7px !important;
    }

    .pdf-capture-sheet.pdf-capture-compact .markdown-body li{
      margin:1.5px 0 !important;
    }

    .pdf-capture-sheet.pdf-capture-compact .markdown-body table{
      margin:7px 0 10px !important;
      font-size:10px !important;
      line-height:1.3 !important;
    }

    .pdf-capture-sheet.pdf-capture-compact .markdown-body th,
    .pdf-capture-sheet.pdf-capture-compact .markdown-body td{
      padding:4.3px 5.5px !important;
    }


    /* PDF Download 전용: 본문을 A4 폭으로 정렬한 뒤, 안전한 줄/블록 경계에서 페이지를 나눕니다. */
    body.pdf-direct-mode{
      background:#ffffff !important;
      overflow-x:hidden !important;
    }

    body.pdf-direct-mode .toolbar{
      opacity:.02;
      pointer-events:none;
    }

    body.pdf-direct-mode .viewer{
      width:794px !important;        /* A4 width at 96dpi */
      max-width:794px !important;
      margin:0 auto !important;
      padding:0 !important;
    }

    body.pdf-direct-mode .page{
      width:794px !important;
      max-width:794px !important;
      min-height:1123px !important;  /* A4 height at 96dpi */
      margin:0 !important;
      padding:42px 48px !important;
      border:0 !important;
      border-radius:0 !important;
      box-shadow:none !important;
      background:#ffffff !important;
    }

    body.pdf-direct-mode .markdown-body{
      font-size:13.2px !important;
      line-height:1.58 !important;
      color:#111827 !important;
    }

    body.pdf-direct-mode .markdown-body h1{
      margin:0 0 18px !important;
      padding-bottom:10px !important;
      font-size:24px !important;
      line-height:1.28 !important;
      border-bottom:1px solid #d8dee4 !important;
    }

    body.pdf-direct-mode .markdown-body h2{
      margin:24px 0 10px !important;
      padding-bottom:7px !important;
      font-size:19px !important;
      line-height:1.3 !important;
      border-bottom:1px solid #d8dee4 !important;
    }

    body.pdf-direct-mode .markdown-body h3{
      margin:18px 0 8px !important;
      font-size:16px !important;
      line-height:1.32 !important;
    }

    body.pdf-direct-mode .markdown-body p{ margin:0 0 10px !important; }
    body.pdf-direct-mode .markdown-body ul,
    body.pdf-direct-mode .markdown-body ol{ margin:0 0 11px !important; padding-left:1.45em !important; }
    body.pdf-direct-mode .markdown-body li{ margin:2px 0 !important; }

    body.pdf-direct-mode .markdown-body table{
      margin:10px 0 14px !important;
      font-size:11px !important;

      border:1px solid #cfd6dd !important;

    }

    }

    }

    body.pdf-direct-mode .mermaid-source{ display:none !important; }

    body.pdf-direct-mode.pdf-compact .markdown-body{ font-size:11.8px !important; line-height:1.45 !important; }
    body.pdf-direct-mode.pdf-compact .markdown-body h1{ font-size:21px !important; margin-bottom:13px !important; }

    body.pdf-direct-mode.pdf-compact .markdown-body ul,
    body.pdf-direct-mode.pdf-compact .markdown-body ol{ margin-bottom:7px !important; }
    body.pdf-direct-mode.pdf-compact .markdown-body table{ font-size:9.8px !important; line-height:1.30 !important; margin:7px 0 9px !important; }
    body.pdf-direct-mode.pdf-compact .markdown-body th,
    body.pdf-direct-mode.pdf-compact .markdown-body td{ padding:3.5px 5px !important; }


    @page{
      size:A4;
      margin:13mm 12mm;
    }

    @media print{
      :root{ color-scheme:light; }

      .markdown-body p,
      .markdown-body li{
        orphans:3;
        widows:3;
      }

      .markdown-body h1,
      .markdown-body h2,
      .markdown-body h3,
      .markdown-body h4,
      .markdown-body h5,
      .markdown-body h6{
        break-after:avoid-page;
        page-break-after:avoid;
      }

      .markdown-body tr,
      .markdown-body pre,
      .markdown-body blockquote,
      .markdown-body .mermaid-block,
      .markdown-body figure,
      .markdown-body img{
        break-inside:avoid-page;
        page-break-inside:avoid;
      }

      html,body{

<body>
  <div class="toolbar">
    <button id="btnDownload" class="btn btn-primary" type="button">PDF Download</button>
    <button id="btnPrint" class="btn" type="button">Print(PDF)</button>
    <div id="badge" class="badge" title=""></div>
    <input id="docInput" type="text" placeholder="문서 경로 또는 URL (예: /proposal/ko/sample.md)" />
    <button id="btnLoad" class="btn" type="button">Load</button>
  </div>

  <main class="viewer">
    <section class="page">
      <article id="app" class="markdown-body"><p class="status">Loading…</p></article>
    </section>
  </main>

  <script>
    const $app = document.getElementById('app');
    const $badge = document.getElementById('badge');
    const $doc = document.getElementById('docInput');
    const $btnDownload = document.getElementById('btnDownload');

    const serviceTitle = 'PLURA';

    let mermaidLoadPromise = null;
    let mermaidInitialized = false;
    let mermaidRenderSequence = 0;

    const FALLBACK_DOC = `# PLURA Markdown PDF Viewer\n\n문서 경로를 지정해 주세요.\n\n- 예: \`index.html?doc=/proposal/ko/sample.md\`\n- 전체 UI: \`index.html?ui=full&doc=/proposal/ko/sample.md\`\n\n표와 긴 문서도 A4 PDF 양식에 맞게 출력됩니다.`;

    function escapeHtml(str = ''){
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function inlineMarkdown(text = ''){
      // 표 셀 등에서 자주 사용하는 <br>, <br/>, <br />만 안전하게 허용합니다.
      // 나머지 HTML은 기존처럼 escape하여 임의 태그 삽입을 막습니다.
      const brToken = '__PLURA_MD_BR__';
      const normalized = String(text).replace(/<br\s*\/?\s*>/gi, brToken);
      let s = escapeHtml(normalized);
      s = s.replace(new RegExp(brToken, 'g'), '<br>');
      s = s.replace(/!\[([^\]]*)\]\(([^)\s]+)(?:\s+"[^"]*")?\)/g, '<img src="$2" alt="$1">');
      s = s.replace(/\[([^\]]+)\]\(([^)\s]+)(?:\s+"[^"]*")?\)/g, '<a href="$2">$1</a>');
      s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
      s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      s = s.replace(/__([^_]+)__/g, '<strong>$1</strong>');
      s = s.replace(/(^|\s)\*([^*]+)\*(?=\s|$)/g, '$1<em>$2</em>');
      return s;
    }


    // 일반 텍스트로 적힌 URL을 클릭 가능한 하이퍼링크로 변환합니다.
    // 예: "참고 기사: https://example.com/news" → 자동 <a> 링크
    // 이미 Markdown 링크로 렌더링된 <a>, 코드 블록, Mermaid/SVG 안의 URL은 제외합니다.
    function splitBareUrlSuffix(candidate = ''){
      let url = String(candidate || '');
      let suffix = '';

      // 문장 끝에 붙는 일반 문장부호는 URL에서 분리합니다.
      const trailingPunctuation = /[.,!?;:'"’”»。．，！？；：…）】》〉]$/u;
      while (url && trailingPunctuation.test(url)) {
        suffix = url.slice(-1) + suffix;
        url = url.slice(0, -1);
      }

      // 닫는 괄호가 URL 내부의 여는 괄호보다 많을 때만 문장부호로 간주합니다.
      const pairs = [
        ['(', ')'],
        ['[', ']'],
        ['{', '}']
      ];
      let changed = true;
      while (url && changed) {
        changed = false;
        for (const [open, close] of pairs) {
          if (!url.endsWith(close)) continue;
          const openCount = url.split(open).length - 1;
          const closeCount = url.split(close).length - 1;
          if (closeCount > openCount) {
            suffix = close + suffix;
            url = url.slice(0, -1);
            changed = true;
          }
        }
      }

      return { url, suffix };
    }

    function linkifyBareUrls(root){
      if (!root || !root.ownerDocument) return;

      const doc = root.ownerDocument;
      const view = doc.defaultView || window;
      const nodeFilter = view.NodeFilter || NodeFilter;
      const urlPattern = /(?:https?:\/\/|www\.)[^\s<>"']+/gi;
      const hasUrlPattern = /(?:https?:\/\/|www\.)/i;
      const blockedSelector = [
        'a',
        'code',
        'pre',
        'script',
        'style',
        'textarea',
        'noscript',
        'svg',
        'math',
        '.mermaid-source',
        '[data-no-autolink]'
      ].join(',');

      const walker = doc.createTreeWalker(root, nodeFilter.SHOW_TEXT, {
        acceptNode(node){
          const value = node.nodeValue || '';
          const parent = node.parentElement;
          if (!parent || !hasUrlPattern.test(value)) return nodeFilter.FILTER_REJECT;
          if (parent.closest(blockedSelector)) return nodeFilter.FILTER_REJECT;
          return nodeFilter.FILTER_ACCEPT;
        }
      });

      // 교체 과정에서 TreeWalker 순회가 흔들리지 않도록 대상 텍스트 노드를 먼저 수집합니다.
      const textNodes = [];
      while (walker.nextNode()) textNodes.push(walker.currentNode);

      textNodes.forEach(textNode => {
        const source = textNode.nodeValue || '';
        const fragment = doc.createDocumentFragment();
        let cursor = 0;
        let matched = false;
        urlPattern.lastIndex = 0;

        for (const match of source.matchAll(urlPattern)) {
          const index = match.index ?? 0;
          const rawCandidate = match[0];
          const { url, suffix } = splitBareUrlSuffix(rawCandidate);
          if (!url) continue;

          const href = /^www\./i.test(url) ? `https://${url}` : url;
          let parsed;
          try {
            parsed = new URL(href);
          } catch {
            continue;
          }
          if (!/^https?:$/.test(parsed.protocol)) continue;

          fragment.appendChild(doc.createTextNode(source.slice(cursor, index)));

          const link = doc.createElement('a');
          link.className = 'auto-link';
          link.href = parsed.href;
          link.textContent = url;
          link.target = '_blank';
          link.rel = 'noopener noreferrer';
          link.title = parsed.href;
          fragment.appendChild(link);

          if (suffix) fragment.appendChild(doc.createTextNode(suffix));
          cursor = index + rawCandidate.length;
          matched = true;
        }

        if (!matched) return;
        fragment.appendChild(doc.createTextNode(source.slice(cursor)));
        textNode.replaceWith(fragment);
      });
    }

    // Markdown hard line break 지원
    // - 줄 끝 공백 2개 이상: "  "
    // - 줄 끝 역슬래시 1개: "\\"
    // 일반 줄바꿈은 기존 Markdown 규칙대로 한 칸으로 이어 붙입니다.
    function renderInlineLines(lines = []){
      const sourceLines = Array.from(lines || [], line => String(line ?? ''));

      return sourceLines.map((rawLine, index) => {
        const trailingSpaces = rawLine.match(/ +$/)?.[0].length || 0;
        const trailingBackslashes = rawLine.match(/\\+$/)?.[0].length || 0;
        const hardBreak = trailingSpaces >= 2 || trailingBackslashes % 2 === 1;

        let content = rawLine;
        if (trailingSpaces >= 2) {
          content = content.slice(0, -trailingSpaces);
        } else if (trailingBackslashes % 2 === 1) {
          content = content.slice(0, -1);
        }

        const html = inlineMarkdown(content.trim());
        if (index === sourceLines.length - 1) return html;
        return html + (hardBreak ? '<br>\n' : ' ');
      }).join('');
    }

    function isTableSep(line){
      return /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/.test(line || '');
    }

    function splitTableRow(line){
      return String(line || '')
        .trim()
        .replace(/^\|/, '')
        .replace(/\|$/, '')
        .split('|')
        .map(v => v.trim());
    }

    function renderFallbackMarkdown(src){
      const lines = String(src || '').replace(/\r\n/g, '\n').split('\n');
      const out = [];
      let paragraph = [];
      let list = null;
      let quote = [];
      let fence = null;

      const flushParagraph = () => {
        if (!paragraph.length) return;
        out.push('<p>' + renderInlineLines(paragraph) + '</p>');
        paragraph = [];
      };

      const flushList = () => {
        if (!list) return;
        out.push(`<${list.type}>${list.items.map(item => `<li>${inlineMarkdown(item)}</li>`).join('')}</${list.type}>`);
        list = null;
      };

      const flushQuote = () => {
        if (!quote.length) return;
        out.push('<blockquote><p>' + renderInlineLines(quote) + '</p></blockquote>');
        quote = [];
      };

      const closeBlocks = () => {
        flushParagraph();
        flushList();
        flushQuote();
      };

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        const trimmed = line.trim();

        if (fence) {
          if (trimmed.startsWith(fence.marker)) {
            out.push(`<pre><code class="language-${escapeHtml(fence.lang)}">${escapeHtml(fence.lines.join('\n'))}</code></pre>`);
            fence = null;
          } else {
            fence.lines.push(line);
          }
          continue;
        }

        const fenceStart = trimmed.match(/^(```+|~~~+)\s*([A-Za-z0-9_-]*)\s*$/);
        if (fenceStart) {
          closeBlocks();
          fence = { marker:fenceStart[1][0] === '`' ? '```' : '~~~', lang:fenceStart[2] || '', lines:[] };
          continue;
        }

        if (!trimmed) {
          closeBlocks();
          continue;
        }

        if (/^---+$/.test(trimmed)) {
          closeBlocks();
          out.push('<hr>');
          continue;
        }

        const heading = trimmed.match(/^(#{1,6})\s+(.+)$/);
        if (heading) {
          closeBlocks();
          const level = heading[1].length;
          out.push(`<h${level}>${inlineMarkdown(heading[2])}</h${level}>`);
          continue;
        }

        const quoteLine = line.match(/^\s*>\s?(.*)$/);
        if (quoteLine) {
          flushParagraph();
          flushList();
          quote.push(quoteLine[1]);
          continue;
        } else {
          flushQuote();
        }

        if (trimmed.includes('|') && lines[i + 1] && isTableSep(lines[i + 1])) {
          closeBlocks();
          const headers = splitTableRow(trimmed);
          i += 2;
          const rows = [];
          while (i < lines.length && lines[i].trim().includes('|')) {
            rows.push(splitTableRow(lines[i]));
            i++;
          }
          i--;
          out.push('<table><thead><tr>' + headers.map(h => `<th>${inlineMarkdown(h)}</th>`).join('') + '</tr></thead><tbody>' +
            rows.map(row => '<tr>' + headers.map((_, idx) => `<td>${inlineMarkdown(row[idx] || '')}</td>`).join('') + '</tr>').join('') +
            '</tbody></table>');
          continue;
        }

        const bullet = line.match(/^\s*[-*+]\s+(.+)$/);
        const ordered = line.match(/^\s*\d+[.)]\s+(.+)$/);
        if (bullet || ordered) {
          flushParagraph();
          flushQuote();
          const type = bullet ? 'ul' : 'ol';
          if (!list || list.type !== type) flushList();
          if (!list) list = { type, items: [] };
          list.items.push((bullet || ordered)[1]);
          continue;
        }

        flushList();
        flushQuote();
        // 선행 공백은 정리하되, Markdown hard break 판정을 위해 줄 끝 공백은 보존합니다.
        paragraph.push(line.trimStart());
      }

      if (fence) {
        out.push(`<pre><code class="language-${escapeHtml(fence.lang)}">${escapeHtml(fence.lines.join('\n'))}</code></pre>`);
      }
      closeBlocks();
      return out.join('\n');
    }

    function createMarkdownRenderer(){
      return null;
    }

    function sanitizeHtml(html){
      return html;
    }

    function stripFrontMatter(src){
      const s = String(src || '').replace(/^\uFEFF/, '');
      const m = s.match(/^---\s*[\s\S]*?\r?\n---\s*(?:\r?\n)?/);
      return m ? s.slice(m[0].length) : s;
    }

    function stripMoreMarkers(src){
      return String(src || '').replace(/<\!\s*[-\u2013\u2014]{2}\s*more\s*[-\u2013\u2014]{2}\s*>/gi, '');
    }

    function toRawGitHubUrl(urlLike){
      try {
        const u = new URL(urlLike);
        const host = u.hostname.toLowerCase();
        if (host !== 'github.com') return u.href;

        const parts = u.pathname.split('/').filter(Boolean);
        if (parts.length >= 5 && (parts[2] === 'blob' || parts[2] === 'raw')) {
          const owner = parts[0];
          const repo = parts[1];
          const branch = parts[3];
          const filePath = parts.slice(4).join('/');
          return `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${filePath}`;
        }
        return u.href;
      } catch {
        return urlLike;
      }
    }

    function resolveDocUrl(pathLike){
      if (!pathLike) return null;
      const p = String(pathLike).trim();
      if (/^https?:\/\//i.test(p)) return toRawGitHubUrl(p);
      if (p.startsWith('/')) return location.origin + p;
      const baseDir = location.origin + location.pathname.replace(/[^/]*$/, '');
      return new URL(p, baseDir).href;
    }

    function getDocFromQuery(){
      const u = new URL(location.href);
      return u.searchParams.get('doc') || 'README.md';
    }

    function getQueryBool(name){
      const v = new URL(location.href).searchParams.get(name);
      return v === '1' || v === 'true' || v === 'yes';
    }

    function stripEmptyTrailingColumns(container){
      container.querySelectorAll('table').forEach(table => {
        const rows = Array.from(table.rows);
        if (!rows.length) return;

        while (rows[0].cells.length > 0) {
          const last = rows[0].cells.length - 1;
          const allEmpty = rows.every(row => {
            const cell = row.cells[last];
            return !cell || cell.textContent.trim() === '';
          });
          if (allEmpty) rows.forEach(row => row.deleteCell(last));
          else break;
        }
      });
    }

    function isLikelyMermaidCode(text){
      const firstLine = String(text || '').trim().split(/\r?\n/).find(line => line.trim());
      if (!firstLine) return false;
      return /^(graph|flowchart|sequenceDiagram|classDiagram|stateDiagram|stateDiagram-v2|erDiagram|journey|gantt|pie|gitGraph|mindmap|timeline|requirementDiagram|c4Context|c4Container|c4Component|c4Dynamic|sankey-beta|xychart-beta|block-beta|packet-beta|architecture-beta)\b/i.test(firstLine.trim());
    }

    function isMermaidCodeElement(code){
      if (!code || code.closest('.mermaid-block')) return false;
      const classText = Array.from(code.classList || []).join(' ').toLowerCase();
      return classText.includes('language-mermaid') || classText.includes('lang-mermaid') || isLikelyMermaidCode(code.textContent || '');
    }

    function mermaidSvgToDataUri(svgText){
      let svg = String(svgText || '');

      if (!/\bxmlns=/.test(svg)) {
        svg = svg.replace('<svg', '<svg xmlns="http://www.w3.org/2000/svg"');
      }

      const viewBoxMatch = svg.match(/\bviewBox=["']([^"']+)["']/i);
      if (viewBoxMatch) {
        const nums = viewBoxMatch[1].trim().split(/\s+/).map(Number);
        if (nums.length === 4 && nums.every(Number.isFinite)) {
          const width = Math.max(1, Math.ceil(nums[2]));
          const height = Math.max(1, Math.ceil(nums[3]));
          svg = svg.replace(/<svg\b([^>]*)>/i, (match, attrs) => {
            const cleanAttrs = attrs
              .replace(/\swidth=(["']).*?\1/i, '')
              .replace(/\sheight=(["']).*?\1/i, '');
            return `<svg${cleanAttrs} width="${width}" height="${height}">`;
          });
        }
      }

      return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
    }

    function normalizeMermaidSource(source){
      const text = String(source || '').trim();
      const firstLine = text.split(/\r?\n/).find(line => line.trim()) || '';

      // 기존 문서에서 노드 줄바꿈을 "\\n"으로 작성한 경우를 지원합니다.
      // Flowchart/Graph에서만 <br/>로 바꾸어 다른 Mermaid 문법에는 영향을 주지 않습니다.
      if (/^(graph|flowchart)\b/i.test(firstLine.trim())) {
        return text.replace(/\\n/g, '<br/>');
      }

      return text;
    }

    async function ensureMermaidLibrary(){
      if (window.mermaid && typeof window.mermaid.render === 'function') {
        if (!mermaidInitialized) {
          window.mermaid.initialize({
            startOnLoad:false,
            securityLevel:'loose',
            theme:'base',
            fontFamily:'-apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", Arial, sans-serif',
            themeVariables:{
              background:'#ffffff',
              primaryColor:'#eef4ff',
              primaryTextColor:'#111827',
              primaryBorderColor:'#7aa2d6',
              lineColor:'#64748b',
              secondaryColor:'#f8fafc',
              tertiaryColor:'#ffffff',
              clusterBkg:'#f8fafc',
              clusterBorder:'#cbd5e1',
              edgeLabelBackground:'#ffffff',
              fontSize:'15px'
            },
            flowchart:{
              htmlLabels:true,
              useMaxWidth:true,
              curve:'basis'
            }
          });
          mermaidInitialized = true;
        }
        return window.mermaid;
      }

      if (!mermaidLoadPromise) {
        mermaidLoadPromise = (async () => {
          await loadFirstAvailableScript([
            'https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.min.js',
            'https://unpkg.com/mermaid@10.9.1/dist/mermaid.min.js'
          ], () => Boolean(window.mermaid && typeof window.mermaid.render === 'function'));

          if (!window.mermaid || typeof window.mermaid.render !== 'function') {
            throw new Error('Mermaid 라이브러리를 불러오지 못했습니다.');
          }

          window.mermaid.initialize({
            startOnLoad:false,
            securityLevel:'loose',
            theme:'base',
            fontFamily:'-apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", Arial, sans-serif',
            themeVariables:{
              background:'#ffffff',
              primaryColor:'#eef4ff',
              primaryTextColor:'#111827',
              primaryBorderColor:'#7aa2d6',
              lineColor:'#64748b',
              secondaryColor:'#f8fafc',
              tertiaryColor:'#ffffff',
              clusterBkg:'#f8fafc',
              clusterBorder:'#cbd5e1',
              edgeLabelBackground:'#ffffff',
              fontSize:'15px'
            },
            flowchart:{
              htmlLabels:true,
              useMaxWidth:true,
              curve:'basis'
            }
          });
          mermaidInitialized = true;
          return window.mermaid;
        })().catch(error => {
          mermaidLoadPromise = null;
          throw error;
        });
      }

      return mermaidLoadPromise;
    }

    async function renderMermaidIn(container){
      const blocks = Array.from(container.querySelectorAll('pre > code'))
        .filter(isMermaidCodeElement);

      if (!blocks.length) return;

      let mermaidApi;
      try {
        mermaidApi = await ensureMermaidLibrary();
      } catch (error) {
        console.error('Mermaid library load error:', error);
        blocks.forEach(code => {
          const pre = code.closest('pre');
          if (!pre || pre.dataset.mermaidErrorShown === '1') return;
          pre.dataset.mermaidErrorShown = '1';
          const warning = document.createElement('div');
          warning.className = 'mermaid-error';
          warning.textContent = 'Mermaid 라이브러리를 불러오지 못해 원본 코드를 표시합니다.';
          pre.before(warning);
        });
        return;
      }

      for (const code of blocks) {
        const originalSource = (code.textContent || '').trim();
        const source = normalizeMermaidSource(originalSource);
        const pre = code.closest('pre');
        if (!pre || !source) continue;

        const wrapper = document.createElement('section');
        wrapper.className = 'mermaid-block';

        const figure = document.createElement('figure');
        figure.className = 'mermaid-figure';

        const diagram = document.createElement('div');
        diagram.className = 'mermaid-diagram';
        diagram.innerHTML = '<div class="mermaid-loading">Mermaid 다이어그램을 렌더링하는 중입니다…</div>';

        figure.appendChild(diagram);
        wrapper.appendChild(figure);

        const details = document.createElement('details');
        details.className = 'mermaid-source';
        details.innerHTML = `
          <summary>Mermaid 원본 코드</summary>
          <pre><code class="language-mermaid">${escapeHtml(originalSource)}</code></pre>
        `;
        wrapper.appendChild(details);
        pre.replaceWith(wrapper);

        try {
          const renderId = `mermaid-${Date.now()}-${++mermaidRenderSequence}`;
          const result = await mermaidApi.render(renderId, source);
          const image = document.createElement('img');
          image.alt = 'Mermaid diagram';
          image.loading = 'eager';
          image.decoding = 'sync';
          image.src = mermaidSvgToDataUri(result.svg);
          diagram.replaceChildren(image);
        } catch (error) {
          console.error('Mermaid render error:', error, originalSource);
          diagram.innerHTML = `<div class="mermaid-error">Mermaid 렌더링에 실패했습니다.<br>${escapeHtml(error?.message || String(error))}</div>`;
          details.open = true;
        }
      }
    }

    function waitForImages(root){
      const images = Array.from(root.querySelectorAll('img'));
      if (!images.length) return Promise.resolve();
      return Promise.all(images.map(img => img.complete ? Promise.resolve() : new Promise(resolve => {
        img.onload = resolve;
        img.onerror = resolve;
      })));
    }

    async function afterRender(){
      stripEmptyTrailingColumns($app);
      linkifyBareUrls($app);

      await renderMermaidIn($app);
      await waitForImages($app);

      const docTitle = (
        $app.querySelector('h1')?.textContent ||
        $app.querySelector('h2')?.textContent ||
        ''
      ).trim();

      document.title = docTitle
        ? `${docTitle} | ${serviceTitle}`
        : `${serviceTitle} | QubitSecurity`;
    }

    async function renderMarkdownText(mdText){
      const cleanText = stripMoreMarkers(stripFrontMatter(mdText));
      if (/^\s*<!doctype html>/i.test(cleanText) || /^\s*<html\b/i.test(cleanText)) {
        $app.innerHTML = '<pre><code>' + escapeHtml(cleanText) + '</code></pre>';
      } else {
        const renderer = createMarkdownRenderer();
        const html = renderer ? renderer.render(cleanText) : renderFallbackMarkdown(cleanText);
        $app.innerHTML = sanitizeHtml(html);
      }

      await afterRender();
    }

    async function renderDoc(pathLike){
      const finalUrl = resolveDocUrl(pathLike);
      $badge.textContent = pathLike || '';
      $badge.title = finalUrl || '';
      $app.innerHTML = '<p class="status">Loading…</p>';

      if (!finalUrl) {
        await renderMarkdownText(FALLBACK_DOC);
        return;
      }

      try {
        const sameOrigin = new URL(finalUrl).origin === location.origin;
        const res = await fetch(finalUrl, {
          cache:'no-store',
          credentials:sameOrigin ? 'same-origin' : 'omit'
        });
        if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
        const raw = await res.text();
        await renderMarkdownText(raw);
      } catch (e) {
        console.error(e);
        const message = `# 문서를 불러오지 못했습니다\n\n요청한 문서 경로를 확인해 주세요.\n\n- 요청 경로: \`${pathLike}\`\n- 해석된 URL: \`${finalUrl || ''}\`\n- 오류: \`${e.message || e}\``;
        await renderMarkdownText(message);
      }
    }

    function setButtonBusy(button, busy, busyText){
      if (!button) return;
      if (busy) {
        button.dataset.label = button.textContent;
        button.textContent = busyText || 'PDF 준비 중…';
        button.disabled = true;
      } else {
        button.textContent = button.dataset.label || 'PDF Download';
        button.disabled = false;
      }
    }

    function shouldUseCompactPrint(){
      const title = document.title || '';
      return getQueryBool('compact') || /PLURA\s*V6|업그레이드|제안/i.test(title);
    }

    function slugifyFileName(s){
      return String(s || 'document')
        .trim()
        .replace(/\.[a-z0-9]+$/i, '')
        .replace(/[\\/:*?"<>|]+/g, '-')
        .replace(/\s+/g, '-')
        .replace(/-+/g, '-')
        .replace(/^-|-$/g, '') || 'document';
    }

    function getRenderedTitle(){
      return (
        $app.querySelector('h1')?.textContent ||
        $app.querySelector('h2')?.textContent ||
        document.title ||
        'document'
      ).trim();
    }

    function loadScriptOnce(src, testFn){
      return new Promise((resolve, reject) => {
        try {
          if (typeof testFn === 'function' && testFn()) {
            resolve();
            return;
          }

          const existing = Array.from(document.scripts).find(script => script.src === src);
          if (existing) {
            existing.addEventListener('load', () => resolve(), { once:true });
            existing.addEventListener('error', () => reject(new Error('script load failed: ' + src)), { once:true });
            return;
          }

          const script = document.createElement('script');
          script.src = src;
          script.async = true;
          script.crossOrigin = 'anonymous';
          script.onload = () => resolve();
          script.onerror = () => reject(new Error('script load failed: ' + src));
          document.head.appendChild(script);
        } catch (e) {
          reject(e);
        }
      });
    }

    async function loadFirstAvailableScript(urls, testFn){
      let lastError = null;
      for (const src of urls) {
        try {
          await loadScriptOnce(src, testFn);
          if (!testFn || testFn()) return;
        } catch (e) {
          lastError = e;
          console.warn(e);
        }
      }
      throw lastError || new Error('PDF 라이브러리를 불러오지 못했습니다.');
    }

    async function ensurePdfDownloadLibraries(){
      await loadFirstAvailableScript([
        'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js',
        'https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js'
      ], () => typeof window.html2canvas === 'function');

      await loadFirstAvailableScript([
        'https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js',
        'https://unpkg.com/jspdf@2.5.1/dist/jspdf.umd.min.js'
      ], () => typeof (window.jspdf?.jsPDF || window.jsPDF) === 'function');

      return {
        html2canvas: window.html2canvas,
        jsPDF: window.jspdf?.jsPDF || window.jsPDF
      };
    }

    function waitFrame(count = 2){
      return new Promise(resolve => {
        const step = () => {
          if (--count <= 0) resolve();
          else requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
      });
    }

    function isCanvasEffectivelyBlank(canvas){
      try {
        if (!canvas || canvas.width < 20 || canvas.height < 20) return true;
        const ctx = canvas.getContext('2d', { willReadFrequently:true });
        if (!ctx) return true;

        const w = canvas.width;
        const h = canvas.height;
        const sampleW = Math.min(w, 900);
        const sampleH = Math.min(h, 1200);
        const x0 = Math.floor((w - sampleW) / 2);
        const y0 = Math.floor((h - sampleH) / 2);
        const data = ctx.getImageData(x0, y0, sampleW, sampleH).data;
        const total = sampleW * sampleH;
        const stride = Math.max(1, Math.floor(total / 90000));
        let nonWhite = 0;
        let checked = 0;

        for (let px = 0; px < total; px += stride) {
          const i = px * 4;
          const r = data[i], g = data[i + 1], b = data[i + 2], a = data[i + 3];
          checked++;
          if (a > 10 && (r < 245 || g < 245 || b < 245)) {
            nonWhite++;
            if (nonWhite > 24) return false;
          }
        }
        return checked === 0 || nonWhite <= 24;
      } catch (e) {
        console.warn('Canvas blank check skipped:', e);
        return false;
      }
    }

    const DIRECT_PDF_LAYOUT = Object.freeze({
      marginLeft: 12,
      marginRight: 12,
      marginTop: 13,
      marginBottom: 13,
      bottomSafety: 1.5
    });

    const PDF_PAGE_LAYOUT = Object.freeze({
      widthMm: 210,
      heightMm: 297,
      marginTopMm: 14,
      marginRightMm: 12,
      marginBottomMm: 14,
      marginLeftMm: 12,
      minFillRatio: 0.62,
      whitespaceSearchPx: 240
    });

    function collectPdfLinks(source){
      const sourceRect = source.getBoundingClientRect();
      return Array.from(source.querySelectorAll('a[href]'))
        .flatMap(a => {
          const href = a.href;
          if (!href || /^javascript:/i.test(href)) return [];
          return Array.from(a.getClientRects()).map(rect => ({
            href,
            left: rect.left - sourceRect.left,
            top: rect.top - sourceRect.top,
            width: rect.width,
            height: rect.height
          }));
        })
        .filter(r => r.width > 1 && r.height > 1);
    }

    function collectPdfLayoutHints(source, maxPageHeightCss){
      const sourceRect = source.getBoundingClientRect();
      const sourceHeight = Math.max(source.scrollHeight, source.offsetHeight, sourceRect.height);
      const preferred = new Set([0, sourceHeight]);
      const avoid = [];
      const keepWithNext = [];

      const clampY = value => Math.max(0, Math.min(sourceHeight, Number(value) || 0));
      const boxOf = element => {
        const rect = element.getBoundingClientRect();
        const top = clampY(rect.top - sourceRect.top);
        const bottom = clampY(rect.bottom - sourceRect.top);
        return { top, bottom, height: Math.max(0, bottom - top) };
      };
      const addBoundary = value => {
        const y = clampY(value);
        if (y > 0.5 && y < sourceHeight - 0.5) preferred.add(Math.round(y * 10) / 10);
      };
      const addAvoid = (box, type) => {
        if (!box || box.height < 3 || box.height > maxPageHeightCss * 0.92) return;
        avoid.push({ start:box.top, end:box.bottom, type });
      };

      // 제목은 다음 본문 첫 부분과 함께 이동하도록 제목 앞을 우선 절단점으로 사용합니다.
      source.querySelectorAll('h1,h2,h3,h4,h5,h6').forEach(heading => {
        const box = boxOf(heading);
        addBoundary(box.top);

        let next = heading.nextElementSibling;
        while (next && next.matches('script,style')) next = next.nextElementSibling;
        let keepEnd = Math.min(sourceHeight, box.bottom + Math.min(96, maxPageHeightCss * 0.13));
        if (next) {
          const nextBox = boxOf(next);
          keepEnd = Math.min(keepEnd, Math.max(box.bottom, nextBox.bottom));
        }
        if (keepEnd > box.top + 4) {
          keepWithNext.push({ start:box.top, end:keepEnd, type:'heading' });
        }
      });

      // 일반 블록의 끝은 안전한 페이지 절단 후보입니다.
      source.querySelectorAll('p,hr').forEach(element => {
        const box = boxOf(element);
        addBoundary(box.bottom);
      });

      source.querySelectorAll('ul,ol').forEach(list => {
        const box = boxOf(list);
        addBoundary(box.top);
        addBoundary(box.bottom);
        if (box.height <= maxPageHeightCss * 0.42) addAvoid(box, 'list');
      });

      source.querySelectorAll('li').forEach(item => {
        const box = boxOf(item);
        addBoundary(box.bottom);
        if (box.height <= maxPageHeightCss * 0.32) addAvoid(box, 'list-item');
      });

      source.querySelectorAll('table').forEach(table => {
        const tableBox = boxOf(table);
        addBoundary(tableBox.top);
        addBoundary(tableBox.bottom);

        // 작은 표는 통째로 이동하고, 중·대형 표는 행 경계에서만 나눕니다.
        if (tableBox.height <= maxPageHeightCss * 0.55) {
          addAvoid(tableBox, 'table');
        }
        table.querySelectorAll('tr').forEach(row => {
          const rowBox = boxOf(row);
          addBoundary(rowBox.bottom);
          addAvoid(rowBox, 'table-row');
        });
      });

      source.querySelectorAll('pre,blockquote,.mermaid-block,figure').forEach(element => {
        const box = boxOf(element);
        addBoundary(box.top);
        addBoundary(box.bottom);
        addAvoid(box, 'atomic-block');
      });

      source.querySelectorAll('img').forEach(image => {
        if (image.closest('.mermaid-block')) return;
        const box = boxOf(image);
        addBoundary(box.top);
        addBoundary(box.bottom);
        addAvoid(box, 'image');
      });

      return {
        preferred: Array.from(preferred).sort((a, b) => a - b),
        avoid,
        keepWithNext,
        sourceHeight
      };
    }

    function isCutInsideRanges(cut, ranges, edgePadding = 1.5){
      return ranges.some(range => (
        cut > range.start + edgePadding &&
        cut < range.end - edgePadding
      ));
    }

    function adjustCutForProtectedRanges(cut, start, minEnd, target, hints){
      let result = cut;
      const ranges = [...hints.keepWithNext, ...hints.avoid];

      // 중첩된 목록/표 구조가 있을 수 있으므로 몇 차례 안정화합니다.
      for (let pass = 0; pass < 5; pass++) {
        const range = ranges.find(item => (
          result > item.start + 1.5 &&
          result < item.end - 1.5
        ));
        if (!range) break;

        const softMinimum = start + Math.min(120, (target - start) * 0.25);
        if (range.start >= minEnd && range.start > start + 12) {
          result = range.start;
        } else if (range.start > softMinimum) {
          // 내용이 잘리는 것보다 페이지 하단 여백이 조금 늘어나는 편을 우선합니다.
          result = range.start;
        } else if (range.end <= target && range.end > start + 12) {
          result = range.end;
        } else {
          break;
        }
      }

      return Math.max(start + 1, Math.min(target, result));
    }

    function findPreferredPdfCut(hints, start, minEnd, target){
      let best = null;
      for (const point of hints.preferred) {
        if (point < minEnd) continue;
        if (point > target) break;
        if (point <= start + 1) continue;
        if (isCutInsideRanges(point, hints.avoid)) continue;
        best = point;
      }
      return best;
    }

    function findCanvasWhitespaceCut(canvas, cssWidth, start, minEnd, target, hints, searchPx){
      try {
        const scale = canvas.width / cssWidth;
        if (!Number.isFinite(scale) || scale <= 0) return null;

        const searchStartCss = Math.max(minEnd, target - searchPx);
        const fromY = Math.max(0, Math.floor(searchStartCss * scale));
        const toY = Math.min(canvas.height - 1, Math.ceil(target * scale));
        const regionHeight = toY - fromY + 1;
        if (regionHeight < 4) return null;

        const ctx = canvas.getContext('2d', { willReadFrequently:true });
        if (!ctx) return null;
        const data = ctx.getImageData(0, fromY, canvas.width, regionHeight).data;
        const xStep = Math.max(2, Math.floor(canvas.width / 520));
        const sampleCount = Math.ceil(canvas.width / xStep);
        const maxInkSamples = Math.max(1, Math.floor(sampleCount * 0.004));
        const minBlankRun = Math.max(3, Math.round(scale * 2.2));

        const rowIsBlank = row => {
          let ink = 0;
          const rowOffset = row * canvas.width * 4;
          for (let x = 0; x < canvas.width; x += xStep) {
            const i = rowOffset + x * 4;
            const r = data[i];
            const g = data[i + 1];
            const b = data[i + 2];
            const a = data[i + 3];
            if (a > 10 && (r < 247 || g < 247 || b < 247)) {
              ink++;
              if (ink > maxInkSamples) return false;
            }
          }
          return true;
        };

        let runBottom = -1;
        let runLength = 0;

        // 목표 지점부터 위로 검색하여 가장 가까운 빈 수평 띠를 사용합니다.
        for (let row = regionHeight - 1; row >= 0; row--) {
          if (rowIsBlank(row)) {
            if (runLength === 0) runBottom = row;
            runLength++;
          } else {
            if (runLength >= minBlankRun) {
              const centerRow = runBottom - (runLength - 1) / 2;
              const cut = (fromY + centerRow) / scale;
              if (
                cut >= minEnd &&
                cut <= target &&
                !isCutInsideRanges(cut, hints.avoid)
              ) {
                return cut;
              }
            }
            runBottom = -1;
            runLength = 0;
          }
        }

        if (runLength >= minBlankRun) {
          const centerRow = runBottom - (runLength - 1) / 2;
          const cut = (fromY + centerRow) / scale;
          if (
            cut >= minEnd &&
            cut <= target &&
            !isCutInsideRanges(cut, hints.avoid)
          ) {
            return cut;
          }
        }
      } catch (e) {
        console.warn('PDF whitespace scan skipped:', e);
      }
      return null;
    }

    function buildPdfPageSlices(source, canvas, cssWidth, cssHeight, layout = PDF_PAGE_LAYOUT){
      const contentWidthMm = layout.widthMm - layout.marginLeftMm - layout.marginRightMm;
      const contentHeightMm = layout.heightMm - layout.marginTopMm - layout.marginBottomMm;
      const maxPageHeightCss = cssWidth * contentHeightMm / contentWidthMm;
      const hints = collectPdfLayoutHints(source, maxPageHeightCss);
      const slices = [];

      let start = 0;
      let guard = 0;
      while (start < cssHeight - 0.5 && guard++ < 250) {
        const target = Math.min(cssHeight, start + maxPageHeightCss);
        let end = target;

        if (target < cssHeight - 0.5) {
          const minEnd = start + maxPageHeightCss * layout.minFillRatio;
          const whitespaceCut = findCanvasWhitespaceCut(
            canvas,
            cssWidth,
            start,
            minEnd,
            target,
            hints,
            Math.min(layout.whitespaceSearchPx, maxPageHeightCss * 0.30)
          );
          const preferredCut = findPreferredPdfCut(hints, start, minEnd, target);

          // 목표 지점에 더 가까운 안전한 절단점을 선택합니다.
          const candidates = [whitespaceCut, preferredCut]
            .filter(value => Number.isFinite(value) && value > start + 1 && value <= target)
            .sort((a, b) => b - a);
          if (candidates.length) end = candidates[0];

          end = adjustCutForProtectedRanges(end, start, minEnd, target, hints);

          // 보호 블록을 통째로 다음 페이지로 이동하면 한 페이지가 다소 짧아질 수 있습니다.
          // 다만 25% 미만으로 지나치게 짧아지는 경우에만 다른 안전 경계를 다시 찾습니다.
          if (end < start + maxPageHeightCss * 0.25) {
            const fallback = findPreferredPdfCut(hints, start, start + maxPageHeightCss * 0.25, target);
            end = fallback || target;
            end = adjustCutForProtectedRanges(end, start, start + 24, target, hints);
          }
        }

        if (cssHeight - end < 4) end = cssHeight;
        if (end <= start + 1) end = Math.min(cssHeight, target);

        slices.push({ startCss:start, endCss:end });
        start = end;
      }

      if (!slices.length) slices.push({ startCss:0, endCss:cssHeight });
      return { slices, maxPageHeightCss };
    }

    function addCanvasSlicesToPdf(pdf, canvas, cssPageWidth, slices, layout = PDF_PAGE_LAYOUT){
      const pageWidth = pdf.internal.pageSize.getWidth();
      const pageHeight = pdf.internal.pageSize.getHeight();
      const contentWidth = pageWidth - layout.marginLeftMm - layout.marginRightMm;
      const contentHeight = pageHeight - layout.marginTopMm - layout.marginBottomMm;
      const canvasScale = canvas.width / cssPageWidth;
      const sliceCanvas = document.createElement('canvas');
      const sliceCtx = sliceCanvas.getContext('2d');
      if (!sliceCtx) throw new Error('PDF 페이지 canvas context를 생성하지 못했습니다.');

      sliceCanvas.width = canvas.width;
      const transforms = [];
      let previousEndPx = 0;

      slices.forEach((slice, index) => {
        const sourceY = index === 0 ? 0 : previousEndPx;
        const requestedEndPx = index === slices.length - 1
          ? canvas.height
          : Math.round(slice.endCss * canvasScale);
        const endY = Math.max(sourceY + 1, Math.min(canvas.height, requestedEndPx));
        previousEndPx = endY;

        const actualSliceHeight = endY - sourceY;
        sliceCanvas.height = actualSliceHeight;
        sliceCtx.fillStyle = '#ffffff';
        sliceCtx.fillRect(0, 0, sliceCanvas.width, sliceCanvas.height);
        sliceCtx.drawImage(
          canvas,
          0, sourceY, canvas.width, actualSliceHeight,
          0, 0, sliceCanvas.width, actualSliceHeight
        );

        if (index > 0) pdf.addPage();

        let drawWidth = contentWidth;
        let drawHeight = actualSliceHeight * drawWidth / canvas.width;
        if (drawHeight > contentHeight) {
          const fit = contentHeight / drawHeight;
          drawWidth *= fit;
          drawHeight = contentHeight;
        }

        const x = layout.marginLeftMm + (contentWidth - drawWidth) / 2;
        const y = layout.marginTopMm;
        const imgData = sliceCanvas.toDataURL('image/jpeg', 0.97);
        pdf.addImage(imgData, 'JPEG', x, y, drawWidth, drawHeight, undefined, 'FAST');

        transforms.push({
          startCss: sourceY / canvasScale,
          endCss: endY / canvasScale,
          xMm: x,
          yMm: y,
          mmPerCssPx: drawWidth / cssPageWidth,
          pageIndex: index
        });
      });

      return transforms;
    }

    function addPdfLinkAnnotations(pdf, links, pageTransforms){
      if (!links.length || !pageTransforms.length || typeof pdf.link !== 'function') return;

      const pdfPageWidth = pdf.internal.pageSize.getWidth();
      const pdfPageHeight = pdf.internal.pageSize.getHeight();

      links.forEach(link => {
        const centerY = link.top + link.height / 2;
        const transform = pageTransforms.find(page => (
          centerY >= page.startCss && centerY < page.endCss
        ));
        if (!transform) return;

        const x = transform.xMm + link.left * transform.mmPerCssPx;
        const y = transform.yMm + (link.top - transform.startCss) * transform.mmPerCssPx;
        const w = link.width * transform.mmPerCssPx;
        const h = Math.max(2.2, link.height * transform.mmPerCssPx);

        if (x < 0 || y < 0 || x >= pdfPageWidth || y >= pdfPageHeight) return;

        try {
          pdf.setPage(transform.pageIndex + 1);
          pdf.link(
            x,
            y,
            Math.min(w, pdfPageWidth - x),
            Math.min(h, pdfPageHeight - y),
            { url:link.href }
          );
        } catch (e) {
          console.warn('PDF link annotation skipped:', e);
        }
      });
    }

    async function downloadPdfDirect(){
      setButtonBusy($btnDownload, true, 'PDF 생성 중…');
      const oldScrollX = window.scrollX || window.pageXOffset || 0;
      const oldScrollY = window.scrollY || window.pageYOffset || 0;
      const oldTitle = document.title;

      try {
        const source = $app;
        if (!source) throw new Error('PDF 캡처 대상(#app)을 찾지 못했습니다.');

        const { html2canvas, jsPDF } = await ensurePdfDownloadLibraries();
        const title = getRenderedTitle();
        const filename = slugifyFileName(title) + '.pdf';

        document.body.classList.add('pdf-direct-mode');
        if (shouldUseCompactPrint()) document.body.classList.add('pdf-compact');
        document.title = title;
        window.scrollTo(0, 0);

        if (document.fonts && document.fonts.ready) {
          try { await document.fonts.ready; } catch {}
        }
        await waitForImages(source);
        await waitFrame(3);

        const rect = source.getBoundingClientRect();
        const cssWidth = Math.ceil(Math.max(rect.width, source.scrollWidth, source.offsetWidth));
        const cssHeight = Math.ceil(Math.max(rect.height, source.scrollHeight, source.offsetHeight));

        if (cssWidth < 50 || cssHeight < 50) {
          throw new Error(`PDF 캡처 대상 크기가 비정상입니다. width=${cssWidth}, height=${cssHeight}`);
        }

        const links = collectPdfLinks(source);
        const scale = Math.min(2.2, Math.max(1.5, window.devicePixelRatio || 2));

        const canvas = await html2canvas(source, {
          backgroundColor:'#ffffff',
          scale,
          useCORS:true,
          allowTaint:false,
          logging:false,
          width:cssWidth,
          height:cssHeight,
          windowWidth:Math.max(794, cssWidth, document.documentElement.clientWidth || 0),
          windowHeight:Math.max(cssHeight, document.documentElement.clientHeight || 0),
          scrollX:0,
          scrollY:0,
          foreignObjectRendering:false,
          removeContainer:true
        });

        if (isCanvasEffectivelyBlank(canvas)) {
          throw new Error('PDF 캡처 결과가 빈 화면으로 감지되었습니다.');
        }

        const pdf = new jsPDF({
          orientation:'portrait',
          unit:'mm',
          format:'a4',
          compress:true
        });

        const pagination = buildPdfPageSlices(source, canvas, cssWidth, cssHeight, PDF_PAGE_LAYOUT);
        const transforms = addCanvasSlicesToPdf(
          pdf,
          canvas,
          cssWidth,
          pagination.slices,
          PDF_PAGE_LAYOUT
        );
        addPdfLinkAnnotations(pdf, links, transforms);
        pdf.setProperties({
          title,
          subject:title,
          creator:'PLURA'
        });
        pdf.save(filename);
      } catch (e) {
        console.error('PDF Download failed:', e);
        alert('PDF Download 생성에 실패했습니다.\n\n' + (e.message || e) + '\n\n직접 다운로드가 실패하는 환경에서는 Print(PDF)를 사용해 주세요.');
      } finally {
        document.body.classList.remove('pdf-direct-mode', 'pdf-compact');
        document.title = oldTitle;
        window.scrollTo(oldScrollX, oldScrollY);
        setButtonBusy($btnDownload, false);
      }
    }

    async function openPrintDialog(){
      const btn = document.getElementById('btnPrint');
      setButtonBusy(btn, true, '인쇄 준비 중…');
      const oldTitle = document.title;

      if (shouldUseCompactPrint()) document.body.classList.add('pdf-compact');

      try {
        if (document.fonts && document.fonts.ready) {
          try { await document.fonts.ready; } catch {}
        }
        await waitForImages(document);
        await waitFrame(2);

        await new Promise(resolve => {
          let resolved = false;
          const cleanup = () => {
            if (resolved) return;
            resolved = true;
            window.removeEventListener('afterprint', cleanup);
            setTimeout(resolve, 80);
          };
          window.addEventListener('afterprint', cleanup);
          window.print();
          setTimeout(cleanup, 1500);
        });
      } finally {
        document.body.classList.remove('pdf-compact');
        document.title = oldTitle;
        setButtonBusy(btn, false);
      }
    }

    function initUI(){
      const url = new URL(location.href);
      const initialDoc = getDocFromQuery();
      const ui = url.searchParams.get('ui');

      if (ui === 'full') {
        document.getElementById('docInput').style.display = '';
        document.getElementById('btnLoad').style.display = '';
      }

      document.getElementById('btnLoad').addEventListener('click', () => {
        const value = ($doc.value || '').trim();
        if (value) renderDoc(value);
      });

      $doc.addEventListener('keydown', event => {
        if (event.key === 'Enter') {
          const value = ($doc.value || '').trim();
          if (value) renderDoc(value);
        }
      });

      document.getElementById('btnDownload').addEventListener('click', downloadPdfDirect);
      document.getElementById('btnPrint').addEventListener('click', openPrintDialog);

      $doc.value = initialDoc;
      renderDoc(initialDoc);
    }

    initUI();
  </script>
</body>
</html>
